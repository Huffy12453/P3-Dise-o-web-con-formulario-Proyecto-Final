<!DOCTYPE html>
<html lang="es">
<head>
<title>DENTISTA BIG MOUTH - Tabla Citas</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="w3.css">
<style>
  * { box-sizing: border-box; }
  body { font-family: "Playwrite NZ Guides", cursive; font-weight: 400; font-style: normal; margin: 0;}
  .header { position: relative; text-align: center; padding: 100px; background-color: #1c47a3; color: white; font-size: 20px; }
  .logo { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); height: 200px; }
  h1 { margin: 0; }
  nav { display: flex; float: left; width: 15%; height: 82vh; background: #5f016b; padding: 20px; font-size: 30px; align-items: center; justify-content: center; }
  nav ol { list-style-type: none; padding: 0; margin: 0; }
  nav li { margin-bottom: 18px; }
  .button1 { border-radius: 12px; font-size: 15px; padding: 10px 20px; border: 2px dashed #843df5; background-color: #8dcbf5; cursor: pointer; width: 100%; }
  .btn-edit { background-color: #ffc107; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
  .btn-delete { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
  article { float: left; padding: 20px; width: 85%; background-color: #ffffff; font-size: 16px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  table th, table td { padding: 10px; border: 1px solid #e0e0e0; text-align: left; }
  table tr:nth-child(even) { background-color: #f9fbfd; }
  footer { padding: 10px; text-align: center; background-color:#9900cc; color: white; clear: both; }

  /* Estilos integrados para el menú completo de edición de citas */
  .fila-edicion { background-color: #fdfaf2 !important; }
  .contenedor-edicion { padding: 20px; background-color: #f5edf9; border: 2px solid #5f016b; border-radius: 8px; margin: 5px 0; }
  .grid-edicion { display: flex; flex-wrap: wrap; gap: 15px; }
  .campo-edicion { display: flex; flex-direction: column; flex: 1 1 200px; }
  .campo-edicion label { font-weight: bold; margin-bottom: 5px; color: #5f016b; font-size: 14px; }
  .campo-edicion input, .campo-edicion select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: inherit; }
  .campo-edicion input:focus, .campo-edicion select:focus { border-color: #5f016b; outline: none; box-shadow: 0 0 5px rgba(95, 1, 107, 0.3); }
  .btn-guardar { background-color: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 10px; }
  .btn-cancelar { background-color: #6c757d; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<header class="header">
  <img src="Logoo.jpg" alt="Logo Dentista Big Mouth" class="logo">
  <h1>Dentista Big Mouth</h1>
  <p> Aquí atendemos hasta a los dragones 🔥</p>
</header>

<section>
  <nav>
    <ol>
      <li><button class="button1"><a href="index.html" style="text-decoration:none; color:inherit;">Inicio</a></button></li>
      <li><button class="button1"><a href="Cuestionariocitas.html" style="text-decoration:none; color:inherit;">Añadir Cita</a></button></li>
    </ol>
  </nav>
  
  <article>
    <div style="margin-top: 40px; overflow-x: auto;">
        <h3>Listado Oficial de Citas</h3>
        <table>
          <thead>
            <tr style="background-color: #5f016b; color: white;">
              <th>ID Cita</th>
              <th>Fecha</th>
              <th>ID Dentista</th>
              <th>Estatus</th>
              <th>ID Paciente</th>
              <th>Motivo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCitasBody"></tbody>
        </table>
      </div>
    </article>
</section>

<script>
    // Arreglo global para evitar problemas con comillas y caracteres especiales
    let citasCargadas = [];

    async function cargarTablaCitas() {
      try {
        const respuesta = await fetch('/api/citas');
        citasCargadas = await respuesta.json();
        const tbody = document.getElementById("tablaCitasBody");
        tbody.innerHTML = "";
  
        citasCargadas.forEach(cita => {
          const fila = document.createElement("tr");
          fila.id = `fila-${cita.IDcitas}`;
          fila.innerHTML = `
            <td><strong>${cita.IDcitas || ''}</strong></td>
            <td>${cita.Fecha || ''}</td>
            <td>${cita.IDentista || ''}</td>
            <td>
              <span style="padding: 3px 8px; border-radius: 12px; font-size: 13px; background-color: ${cita.Estatus === 'Finalizada' ? '#d4edda' : cita.Estatus === 'Cancelada' ? '#f8d7da' : '#e2e3e5'}; color: #000;">
                ${cita.Estatus || ''}
              </span>
            </td>
            <td>${cita.IDPaciente || ''}</td>
            <td>${cita.Motivo || ''}</td>
            <td>
              <button class="btn-edit" onclick="editarCita('${cita.IDcitas}')">✏️</button>
              <button class="btn-delete" onclick="eliminarCita('${cita.IDcitas}')">🗑️</button>
            </td>
          `;
          tbody.appendChild(fila);
        });
      } catch (error) {
        console.error("Error al cargar la tabla de citas:", error);
      }
    }

    function editarCita(id) {
        const menuExistente = document.getElementById(`menu-edit-${id}`);
        if (menuExistente) {
            menuExistente.remove();
            return;
        }

        document.querySelectorAll('.fila-edicion').forEach(el => el.remove());

        const cita = citasCargadas.find(c => String(c.IDcitas) === String(id));
        if (!cita) return;

        const filaOriginal = document.getElementById(`fila-${id}`);
        const filaMenu = document.createElement("tr");
        filaMenu.id = `menu-edit-${id}`;
        filaMenu.className = "fila-edicion";
        
        // Mantiene el select de Estatus para no escribir estados equivocados
        filaMenu.innerHTML = `
            <td colspan="7">
                <div class="contenedor-edicion">
                    <h4 style="margin: 0 0 15px 0; color: #5f016b; font-weight: bold;">📝 Modificar Registro de Cita (ID: ${id})</h4>
                    <div class="grid-edicion">
                        <div class="campo-edicion">
                            <label>Fecha:</label>
                            <input type="text" id="edit-fecha-${id}" value="${cita.Fecha || ''}">
                        </div>
                        <div class="campo-edicion">
                            <label>ID Dentista:</label>
                            <input type="text" id="edit-dentista-${id}" value="${cita.IDentista || ''}">
                        </div>
                        <div class="campo-edicion">
                            <label>ID Paciente:</label>
                            <input type="text" id="edit-paciente-${id}" value="${cita.IDPaciente || ''}">
                        </div>
                        <div class="campo-edicion">
                            <label>Estatus:</label>
                            <select id="edit-estatus-${id}">
                                <option value="Finalizada" ${cita.Estatus === 'Finalizada' ? 'selected' : ''}>Finalizada</option>
                                <option value="Cancelada" ${cita.Estatus === 'Cancelada' ? 'selected' : ''}>Cancelada</option>
                                <option value="En sala de espera" ${cita.Estatus === 'En sala de espera' ? 'selected' : ''}>En sala de espera</option>
                                <option value="Confirmada" ${cita.Estatus === 'Confirmada' ? 'selected' : ''}>Confirmada</option>
                                <option value="En curso" ${cita.Estatus === 'En curso' ? 'selected' : ''}>En curso</option>
                                <option value="Ausente" ${cita.Estatus === 'Ausente' ? 'selected' : ''}>Ausente</option>
                            </select>
                        </div>
                        <div class="campo-edicion" style="flex: 1 1 100%;">
                            <label>Motivo de Consulta:</label>
                            <input type="text" id="edit-motivo-${id}" value="${cita.Motivo || ''}">
                        </div>
                    </div>
                    <div style="margin-top: 20px; text-align: right;">
                        <button class="btn-guardar" onclick="guardarCambiosCita('${id}')">Guardar Cambios</button>
                        <button class="btn-cancelar" onclick="document.getElementById('menu-edit-${id}').remove()">Cancelar</button>
                    </div>
                </div>
            </td>
        `;

        filaOriginal.parentNode.insertBefore(filaMenu, filaOriginal.nextSibling);
    }

    async function guardarCambiosCita(id) {
        // Recoge todos los datos nuevos del panel
        const datosActualizados = {
            Fecha: document.getElementById(`edit-fecha-${id}`).value,
            IDentista: document.getElementById(`edit-dentista-${id}`).value,
            Estatus: document.getElementById(`edit-estatus-${id}`).value,
            IDPaciente: document.getElementById(`edit-paciente-${id}`).value,
            Motivo: document.getElementById(`edit-motivo-${id}`).value
        };

        try {
            const respuesta = await fetch(`/api/citas/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosActualizados)
            });
            const resultado = await respuesta.json();
            alert(resultado.mensaje || "Cita actualizada correctamente");
            cargarTablaCitas();
        } catch (error) {
            alert("Error al actualizar la cita");
        }
    }

    async function eliminarCita(id) {
        if (!confirm("¿Seguro que deseas eliminar esta cita?")) return;
        try {
            const respuesta = await fetch(`/api/citas/${id}`, { method: 'DELETE' });
            const resultado = await respuesta.json();
            alert(resultado.mensaje);
            cargarTablaCitas();
        } catch (error) {
            alert("Error al eliminar la cita");
        }
    }
  
    window.addEventListener('DOMContentLoaded', cargarTablaCitas);
</script>

<footer>
  <p>  | Muñiz Garcia Manuel Hector 4-I |  </p> 
  <p> | Num control: 0601  |  </p>
  <p> | 4to semestre - Programacion |  </p> 
  <p> | Bases de Datos No Relacionales |  </p>
</footer>
</body>
</html>
