<!DOCTYPE html>
<html lang="en">
<head>
<title>DENTISTA BIG MOUTH - Registrar Dentista</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="w3.css">
<style>
  body { font-family: "Playwrite NZ Guides", cursive; font-weight: 400; margin: 0; background-color: #ffffff; }
  .button1 { border-radius: 12px; font-size: 15px; padding: 10px 20px; border: 2px dashed #843df5; background-color: #8dcbf5; cursor: pointer; }
  .header { position: relative; text-align: center; padding: 100px; background: #1c47a3; color: white; font-size: 20px; }
  .logo { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); height: 200px; }
  h1 { margin: 0; }
  nav { display: flex; float: left; width: 15%; height: 90vh; background-color: #5f016b; padding: 20px; align-items: center; justify-content: center; font-size: 30px; box-sizing: border-box; }
  nav ol { list-style-type: none; padding: 0; margin: 0; }
  article { float: left; padding: 30px; width: 85%; background-color: #ffffff; position: relative; font-size: 20px; box-sizing: border-box; }
  footer { padding: 10px; text-align: center; background-color:#9900cc; color: white; clear: both; }
  article form { border: 2px dashed #5f016b; border-radius: 12px; padding: 30px; background-color: #fff; margin-top: 15px; }
  article label { display: block; margin-bottom: 8px; color: #5f016b; font-size: 14px; font-weight: bold; }
  article input, article select { width: 100%; padding: 10px; border: 1px solid #c9b0e8; border-radius: 6px; box-sizing: border-box; font-size: 14px; color: #555; margin-bottom: 20px; font-family: inherit; }
  article button[type="submit"] { background-color: #5f016b; color: white; border: none; padding: 15px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
  @media (max-width: 600px) { nav, article { width: 100%; height: auto; } }
</style>
</head>
<body>

<header class="header">
  <img src="Logoo.jpg" alt="Logo Dentista Big Mouth" class="logo">
  <h1>Dentista Big Mouth</h1>
  <p> Aquí atendemos hasta a los dragones 🔥</p>
</header>

<section>
<nav>
  <ol>
    <li>
      <button class="button1"><a href="Registrosdentistas.html" style="text-decoration: none; color: inherit;">Regresar al Registro de Dentistas</a></button>
    </li>
  </ol>
</nav>

  <article>
    <p style="font-size: 16px; margin-top: 0;">Completa los campos para añadir un nuevo documento a la colección:</p>
    
    <form onsubmit="agregardentistas(event)">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        
        <div style="grid-column: span 2;">
          <label>ID Dentista</label>
          <input type="text" id="IDentista" name="IDentista" placeholder="ej. D-11" required>
        </div>

        <div style="grid-column: span 2;">
          <label>Nombre</label>
          <input type="text" id="Nombre" name="Nombre" placeholder="Nombre completo del dentista" required>
        </div>

        <div>
          <label>Genero</label>
          <select id="Genero" name="Genero" required>
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="Masculino">Masculino</option>
            <option value="Femenino">Fememenino</option>
          </select>
        </div>

        <div>
          <label>CEP</label>
          <input type="text" id="CEP" name="CEP" placeholder="Cédula profesional" required>
        </div>

        <div>
          <label>Horario</label>
          <input type="text" id="Horario" name="Horario" placeholder="Horario de atención (ej. 9am - 2pm)" required>
        </div>

        <div>
          <label>Especialidad</label>
          <input type="text" id="Especialidad" name="Especialidad" placeholder="Especialidad dental (ej. Ortodoncista)" required>
        </div>

        <div>
          <label>DiasLaborales</label>
          <input type="text" id="DiasLaborales" name="DiasLaborales" placeholder="Días laborales (ej. Lunes-Sábado)" required>
        </div>

        <div>
          <label>Telefono</label>
          <input type="text" id="Telefono" name="Telefono" placeholder="Número de teléfono (ej. 656-7777)" required>
        </div>

        <div style="grid-column: span 2;">
          <button type="submit">Guardar Registro de Dentista</button>
        </div>
      </div>
    </form>

    <div id="listadentistas" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div>
  </article>
</section>

<script>
  async function agregardentistas(e){
    e.preventDefault();

    let IDentista = document.getElementById("IDentista").value;
    let Nombre = document.getElementById("Nombre").value;
    let Genero = document.getElementById("Genero").value;
    let CEP = document.getElementById("CEP").value;
    let Horario = document.getElementById("Horario").value;
    let Especialidad = document.getElementById("Especialidad").value;
    let DiasLaborales = document.getElementById("DiasLaborales").value;
    let Telefono = document.getElementById("Telefono").value;

    if(IDentista === "" || Nombre === "" || Genero === "" || CEP === "" || Horario === "" || Especialidad === "" || DiasLaborales === "" || Telefono === ""){
        alert("Por favor llene todos los campos");
        return;
    }

    const datosDentista = { IDentista, Nombre, Genero, CEP, Horario, Especialidad, DiasLaborales, Telefono };

    try {
        const respuesta = await fetch('/api/dentistas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datosDentista)
        });
        
        const resultado = await respuesta.json();

        if (respuesta.ok) {
            let nuevaCard = document.createElement('div');
            nuevaCard.classList.add('card');
            nuevaCard.style = "border: 1px solid #5f016b; padding: 15px; border-radius: 8px; background: #f9f9f9;";
            
            nuevaCard.innerHTML = `
                <h2 style="margin-top:0; color:#5f016b;">${Nombre}</h2>
                <p><strong>ID Dentista:</strong> ${IDentista}</p>
                <p><strong>Género:</strong> ${Genero}</p>
                <p><strong>Cédula Profesional:</strong> ${CEP}</p>
                <p><strong>Especialidad:</strong> ${Especialidad}</p>
                <p><strong>Horario:</strong> ${Horario}</p>
                <p><strong>Días Laborales:</strong> ${DiasLaborales}</p>
                <p><strong>Teléfono:</strong> ${Telefono}</p>
            `;
            document.getElementById("listadentistas").appendChild(nuevaCard);
            
            document.getElementById("IDentista").value = "";
            document.getElementById("Nombre").value = "";
            document.getElementById("Genero").value = "";
            document.getElementById("CEP").value = "";
            document.getElementById("Horario").value = "";
            document.getElementById("Especialidad").value = "";
            document.getElementById("DiasLaborales").value = "";
            document.getElementById("Telefono").value = "";

            alert("✅ " + resultado.mensaje);
        } else {
            alert("No se pudo guardar: " + (resultado.error || "Error"));
        }
    } catch (error) {
        alert("❌ Error de conexión con el servidor");
    }
  }
</script>
<footer>
  <p>  | Muñiz Garcia Manuel Hector 4-I |  </p> 
  <p> | Num control: 0601  |  </p>
  <p> | 4to semestre - Programacion |  </p> 
  <p> | Bases de Datos No Relacionales |  </p>
</footer>
</body>
</html>
